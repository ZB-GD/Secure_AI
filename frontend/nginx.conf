server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so upstream hostnames are resolved at request
    # time, not at nginx startup (avoids "host not found" when backend restarts).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # RAG tutor — must come BEFORE the general /api block
    location ^~ /api/rag/ {
        set $tutor_upstream "http://tutor-rag:8010";
        rewrite ^/api/rag/(.*)$ /$1 break;
        proxy_pass $tutor_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # All other backend routes (including /auth)
    location ~ ^/(health|auth|labs|logs|api)(/.*)?$ {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
