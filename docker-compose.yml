services:
  sensor:
    build:
      context: .
      dockerfile: pipeline_nodes/sensor_data/Dockerfile
    container_name: seclabs-sensor
    ports:
      - "8001:8001"
    networks:
      - seclabs-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  edge:
    build:
      context: .
      dockerfile: pipeline_nodes/edge_preprocessing/Dockerfile
    container_name: seclabs-edge
    ports:
      - "8002:8002"
    depends_on:
      sensor:
        condition: service_healthy
    networks:
      - seclabs-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  actuator:
    build:
      context: .
      dockerfile: pipeline_nodes/actuator/Dockerfile
    container_name: seclabs-actuator
    ports:
      - "8003:8003"
    depends_on:
      edge:
        condition: service_healthy
    environment:
      - MODELS_DIR=/models
    volumes:
      - model-store:/models
    networks:
      - seclabs-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  trainer:
    build:
      context: .
      dockerfile: pipeline_nodes/model_trainer/Dockerfile
    container_name: seclabs-trainer
    ports:
      - "8004:8004"
    depends_on:
      actuator:
        condition: service_healthy
    environment:
      - MODELS_DIR=/models
      - DB_PATH=/data/trainer_store.db
    volumes:
      - model-store:/models
      - trainer-db:/data
    networks:
      - seclabs-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8004/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: seclabs-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - RAG_SERVICE_URL=http://tutor-rag:8010
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - seclabs-network
    depends_on:
      sensor:
        condition: service_healthy
      edge:
        condition: service_healthy
      actuator:
        condition: service_healthy
      trainer:
        condition: service_healthy
      tutor-rag:
        condition: service_healthy
    restart: unless-stopped

  tutor-rag:
    env_file:
      - ./backend/.env
    build:
      context: .
      dockerfile: services/tutor_rag/Dockerfile
    container_name: seclabs-tutor-rag
    ports:
      - "8010:8010"
    networks:
      - seclabs-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seclabs-frontend
    ports:
      - "3000:80"
    networks:
      - seclabs-network
    depends_on:
      - backend
    restart: unless-stopped

  lab-base-novnc:
    profiles:
      - labs-build
    image: lab-base-novnc
    build:
      context: ./labs/base-novnc
      dockerfile: Dockerfile
    command: ["true"]

  lab1:
    profiles:
      - labs-build
    image: seclabs-lab1:vuln
    build:
      context: ./labs/sensor-data
      dockerfile: Dockerfile
    depends_on:
      - lab-base-novnc
    command: ["true"]

networks:
  seclabs-network:
    driver: bridge

volumes:
  model-store:
  trainer-db:
